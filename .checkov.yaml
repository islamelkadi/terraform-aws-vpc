# Checkov configuration for terraform-aws-vpc
# Suppressions for checks that are not applicable to example/demo code

skip-check:
  # Security Group Egress - Intentional for VPC endpoints
  - CKV_AWS_382  # VPC endpoint security groups need broad egress for AWS service access
  
  # NACL All Ports - Default deny rule
  - CKV_AWS_352  # NACL default deny rule intentionally blocks all ports
  
  # CloudWatch Log Group KMS Encryption - Optional in examples
  - CKV_AWS_158  # KMS encryption for VPC Flow Logs adds cost
  
  # Security Group Attachment - Example code
  - CKV2_AWS_5  # Security groups in example code may not be immediately attached
  
  # Default Security Group - VPC module responsibility
  - CKV2_AWS_12  # Default security group restrictions should be managed by users after VPC creation
  
  # NACL Attachment - Example code
  - CKV2_AWS_1  # NACL attachment to subnets is demonstrated separately
  
  # Terraform Module Sources - Using semantic versioning tags
  - CKV_TF_1  # Using semantic version tags (?ref=v1.0.0) instead of commit hashes
  - CKV_TF_2  # Using semantic version tags (?ref=v1.0.0) which is a valid versioning strategy
