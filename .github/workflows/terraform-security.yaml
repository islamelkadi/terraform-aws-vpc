name: Terraform Security Scan (SAST)

on:
  push:
    paths:
      - '**.tf'
      - '.checkov.yaml'
      - '.github/workflows/terraform-security.yaml'
  pull_request:
    paths:
      - '**.tf'
      - '.checkov.yaml'
      - '.github/workflows/terraform-security.yaml'
  workflow_dispatch:

jobs:
  checkov:
    uses: islamelkadi/reusable-cicd-workflows/.github/workflows/checkov-scan.yaml@main
    with:
      working_directory: '.'
      config_file: '.checkov.yaml'
